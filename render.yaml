services:
  - type: web
    name: otp-mcp-server
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -e .
    startCommand: otp-mcp-server --http-stream --host 0.0.0.0 --port $PORT
    envVars:
      - key: OTP_MCP_SERVER_TRANSPORT
        value: http-stream
      - key: OTP_MCP_SERVER_HOST
        value: 0.0.0.0
      - key: OTP_MCP_SERVER_LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.0
