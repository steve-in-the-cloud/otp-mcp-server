services:
  - type: web
    name: otp-mcp-server
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -e .
    startCommand: bash start.sh
    envVars:
      - key: OTP_MCP_SERVER_TRANSPORT
        value: http
      - key: OTP_MCP_SERVER_HOST
        value: 0.0.0.0
      - key: OTP_MCP_SERVER_LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
